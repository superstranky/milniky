<style>
  :root{
    --bg1:#0f172a; --bg2:#1e1b4b; --card:#ffffff; --ink:#0f172a;
    --muted:#64748b; --accent:#7c3aed; --accent2:#ec4899;
    --soft:#f1f5f9; --line:#e2e8f0; --good:#16a34a; --past:#94a3b8;
    --gold:#f59e0b; --goldbg:#fffbeb;
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:linear-gradient(135deg,var(--bg1),var(--bg2)); min-height:100vh;}
  .wrap{max-width:880px; margin:0 auto; padding:20px 18px 80px}
  .topbar{display:flex; justify-content:flex-end; margin-bottom:8px}
  .langSwitch{display:flex; gap:3px; background:rgba(255,255,255,.12); border-radius:999px; padding:4px}
  .langSwitch button{background:transparent; color:#fff; padding:5px 12px; font-size:13px; font-weight:700; border-radius:999px; opacity:.55}
  .langSwitch button.on{background:#fff; color:var(--ink); opacity:1}
  header{text-align:center; color:#fff; margin-bottom:24px}
  header h1{font-size:30px; margin:0 0 8px; letter-spacing:-.5px}
  header p{margin:0; opacity:.8}
  #confetti{position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:9999; display:none}
  .birthday{display:none; text-align:center; background:linear-gradient(135deg,#7c3aed,#ec4899); color:#fff; border-radius:18px; padding:24px 22px; margin-bottom:20px; box-shadow:0 20px 50px rgba(124,58,237,.45)}
  .birthday.show{display:block; animation:pop .5s ease}
  .birthday h2{margin:0 0 6px; font-size:27px; letter-spacing:-.5px}
  .birthday p{margin:0; opacity:.95; font-size:15px}
  @keyframes pop{0%{transform:scale(.85); opacity:0} 100%{transform:scale(1); opacity:1}}
  .copied{background:var(--good)!important; color:#fff!important; border-color:var(--good)!important}
  .panel{background:var(--card); border-radius:18px; padding:22px; box-shadow:0 20px 50px rgba(0,0,0,.25); margin-bottom:20px}
  .inputRow{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end}
  label{font-size:13px; font-weight:600; color:var(--muted); display:block; margin-bottom:6px}
  input[type=date],input[type=text]{font-size:16px; padding:11px 12px; border:1px solid var(--line); border-radius:12px; width:100%; background:#fff}
  .field{flex:1; min-width:180px}
  button{font-size:15px; font-weight:600; padding:12px 18px; border:0; border-radius:12px; cursor:pointer; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; transition:transform .08s ease}
  button:active{transform:scale(.97)}
  button.ghost{background:var(--soft); color:var(--ink); border:1px solid var(--line)}
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:12px; margin-top:4px}
  .stat{background:var(--soft); border-radius:14px; padding:14px; text-align:center}
  .stat .n{font-size:21px; font-weight:800; color:var(--accent)}
  .stat.live .n{color:var(--accent2); font-size:26px}
  .stat .l{font-size:12px; color:var(--muted); margin-top:3px}
  .stat .musk{font-size:12.5px; color:#475569; margin-top:8px; line-height:1.45}
  .ageLine{font-size:18px; text-align:center; margin:2px 0 16px}
  .ageLine b{color:var(--accent)}
  .sectionTitle{font-size:17px; font-weight:800; color:#1e293b; letter-spacing:-.2px; margin:0 0 4px}
  .sectionSub{font-size:13px; color:var(--muted); margin:0 0 14px}
  .filters{display:flex; gap:8px; flex-wrap:wrap; margin:4px 0 14px}
  .chip{font-size:13px; padding:7px 13px; border-radius:999px; border:1px solid var(--line); background:#fff; cursor:pointer; user-select:none}
  .chip.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  .toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:14px 0 0}
  .helpbox{background:var(--soft); border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:12px; font-size:13px; line-height:1.55; color:#475569}
  .sbtn{font-size:13px; font-weight:700; padding:8px 13px; border-radius:10px; text-decoration:none; color:#fff; border:0; cursor:pointer; display:inline-block}
  .sbtn.wa{background:#25D366} .sbtn.fb{background:#1877F2} .sbtn.x{background:#111827} .sbtn.tg{background:#229ED9} #shareNative{background:#475569; color:#fff}
  .mile{display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--line); border-radius:14px; margin-bottom:10px; background:#fff}
  .mile.passed{opacity:.5}
  .mile.super{border-color:var(--gold); background:var(--goldbg); box-shadow:0 0 0 1px var(--gold) inset}
  .mile .emoji{font-size:26px; width:34px; text-align:center; flex:0 0 auto}
  .mile .body{flex:1; min-width:0}
  .mile .t{font-weight:700; font-size:15px}
  .mile .t .sep{color:var(--muted); font-weight:400; margin:0 4px}
  .mile.super .t{color:#b45309}
  .mile .badge{display:inline-block; font-size:10px; font-weight:800; color:#fff; background:var(--gold); padding:2px 7px; border-radius:999px; margin-left:6px; vertical-align:middle; letter-spacing:.3px}
  .mile .d{font-size:13px; color:var(--muted); margin-top:2px}
  .mile .when{font-size:13px; font-weight:700; white-space:nowrap}
  .mile .when.fut{color:var(--good)}
  .mile .when.past{color:var(--past)}
  .mile .acts{display:flex; gap:8px; align-items:center; flex:0 0 auto}
  .mile a.gcal{font-size:12px; text-decoration:none; background:var(--soft); padding:7px 10px; border-radius:10px; color:var(--ink); border:1px solid var(--line); white-space:nowrap}
  .mile input[type=checkbox]{width:18px; height:18px; flex:0 0 auto}
  .hint{font-size:13px; color:var(--muted); line-height:1.5}
  .empty{color:var(--muted); text-align:center; padding:26px; font-size:14px}
  .tiers{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-top:14px}
  .tier{border:1px solid var(--line); border-radius:14px; padding:16px 14px; text-align:center}
  .tier .e{font-size:28px}
  .tier .l{font-size:13px; margin:6px 0 10px; color:#475569; min-height:34px}
  .tier .qr{width:130px; height:130px; margin:0 auto 10px; border-radius:10px; display:block}
  .tier .qrph{width:130px; height:130px; margin:0 auto 10px; border:2px dashed var(--line); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--past); font-size:12px; text-align:center; padding:8px}
  .tier a.pay{display:inline-block; font-size:13px; font-weight:700; text-decoration:none; color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent2)); padding:8px 14px; border-radius:10px}
  footer{text-align:center; color:#fff; opacity:.6; font-size:12px; margin-top:20px}

let lang = 'sk';
const L = ()=> I18N[lang];
let fmt, fmtShort, nf;
function setFormatters(){
  const loc = L().locale;
  fmt = new Intl.DateTimeFormat(loc,{day:'numeric',month:'long',year:'numeric'});
  fmtShort = new Intl.DateTimeFormat(loc,{day:'2-digit',month:'2-digit',year:'numeric'});
  nf = new Intl.NumberFormat(loc);
}

let GROUPS = [], HL_KEYS = new Set(), activeTypes = new Set(), showPast = false, lastDob = null, secTimer = null;

function addDays(d,n){ return new Date(d.getTime()+n*DAY); }
function addMonths(d,n){ const r=new Date(d); r.setMonth(r.getMonth()+n); return r; }
function addYears(d,n){ const r=new Date(d); r.setFullYear(r.getFullYear()+n); return r; }
function todayMid(){ const d=new Date(); d.setHours(0,0,0,0); return d; }

const TYPE_EMOJI = {day:'📅',week:'🗓️',month:'🌙',year:'🎉'};

const MUSK_PER_SEC = 3000;   // $/s — orientačný „zárobok“ Elona Muska (≈ 95 mld $/rok); laditeľné
function muskFact(seconds){
  const s = seconds / MUSK_PER_SEC;    // koľko sekúnd Musk potrebuje (1 prežitá sekunda = 1 dolár)
  return { totalHours: s/3600, days: Math.floor(s/86400), hours: Math.round((s%86400)/3600), minutes: Math.round(s/60) };
}

function build(dob){
  const out = [];
  const push = (type,count,date,big)=> out.push({type,count,date,big:!!big});
  for(let n=1000;n<=40000;n+=1000)  push('day',  n, addDays(dob,n),   n%5000===0);
  for(let n=500;n<=5200;n+=500)     push('week', n, addDays(dob,n*7), n%1000===0);
  for(let n=100;n<=1200;n+=100)     push('month',n, addMonths(dob,n), n%500===0);
  const special = new Set([18,21,30,40,50,60,65,70,75,80,90,100]);
  for(let n=1;n<=120;n++)           push('year', n, addYears(dob,n),  n%10===0||special.has(n));
  return out;
}

function pad(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`; }

function groupAll(miles){
  const map = new Map();
  miles.forEach(m=>{
    const k = ymd(m.date);
    if(!map.has(k)) map.set(k,{key:k, date:m.date, items:[], types:new Set(), big:false});
    const g = map.get(k); g.items.push(m); g.types.add(m.type); if(m.big) g.big = true;
  });
  const arr = [...map.values()].sort((a,b)=>a.date-b.date);
  arr.forEach(g=>{ g.super = g.items.length>1; g.items.sort((a,b)=>(b.big-a.big)||(a.type>b.type?1:-1)); });
  return arr;
}

function shortLabel(item){
  if(item.type==='year') return L().yearLabel(item.count);
  return `${nf.format(item.count)} ${L().units[item.type]}`;
}
function groupTitle(g, name){ return (name?name+': ':'') + g.items.map(shortLabel).join(' · '); }
function groupEmoji(g){ return g.super ? '⭐' : TYPE_EMOJI[g.items[0].type]; }

function relWhen(date, now){
  const r = L().rel;
  const diff = Math.round((date - now)/DAY);
  if(diff===0) return {txt:r.today, cls:'fut'};
  if(diff>0){
    if(diff===1) return {txt:r.tomorrow, cls:'fut'};
    if(diff<60)  return {txt:r.inDays(diff), cls:'fut'};
    if(diff<365) return {txt:r.inMonths(Math.round(diff/30.44)), cls:'fut'};
    return {txt:r.inYears((diff/365.25).toFixed(1)), cls:'fut'};
  }
  const ad=-diff;
  if(ad===1) return {txt:r.yesterday, cls:'past'};
  if(ad<60)  return {txt:r.agoDays(ad), cls:'past'};
  if(ad<365) return {txt:r.agoMonths(Math.round(ad/30.44)), cls:'past'};
  return {txt:r.agoYears((ad/365.25).toFixed(1)), cls:'past'};
}

function gcalLink(g, name){
  const start = ymd(g.date), end = ymd(addDays(g.date,1));
  const text = encodeURIComponent(groupTitle(g,name));
  const det = encodeURIComponent(L().icsDesc(fmtShort.format(g.date)));
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${start}/${end}&details=${det}`;
}

function rowHTML(g, name, now, defaultChecked){
  const passed = g.date < todayMid();
  const w = relWhen(g.date, now);
  const title = g.items.map(shortLabel).join('<span class="sep">·</span>');
  const badge = g.super ? '<span class="badge">SUPER</span>' : '';
  const checked = (defaultChecked && !passed) ? 'checked' : '';
  return `<div class="mile ${passed?'passed':''} ${g.super?'super':''}">
    <input type="checkbox" data-key="${g.key}" ${checked}>
    <div class="emoji">${groupEmoji(g)}</div>
    <div class="body">
      <div class="t">${(name?name+': ':'')}${title}${badge}</div>
      <div class="d">${fmt.format(g.date)}</div>
    </div>
    <div class="acts">
      <a class="gcal" href="${gcalLink(g,name)}" target="_blank" rel="noopener">${L().gcalBtn}</a>
      <div class="when ${w.cls}">${w.txt}</div>
    </div>
  </div>`;
}

const NEAR_DAYS = 365;   // do roka – čo spadne do tohto okna (dni/týždne/mesiace), ide hore
function pickHighlights(){
  const today = todayMid();
  const nearEnd = addDays(today, NEAR_DAYS);
  const up = GROUPS.filter(g=>g.date>=today);
  const chosen = new Map();
  const add = g=>{ if(g) chosen.set(g.key,g); };

  // 1) všetko v blízkej budúcnosti – okrem obyčajných (nie okrúhlych) narodenín,
  //    aby sa hore nepratalo napr. 51. namiesto významnejších 50.
  up.filter(g=>g.date<=nearEnd).forEach(g=>{
    const onlyOrdinaryBirthday = [...g.types].every(t=>t==='year') && !g.big;
    if(!onlyOrdinaryBirthday) add(g);
  });
  // 2) najbližšie významné narodeniny (50, 60, 65…), aj keď sú ďalej
  add(up.find(g=>g.items.some(i=>i.type==='year' && i.big)));
  // 3) najbližší veľký míľnik každej kategórie, aj keď je ďalej
  ['day','week','month'].forEach(t=> add(up.find(g=>g.items.some(i=>i.type===t && i.big))));
  // 4) najbližšie super výročie
  add(up.find(g=>g.super));

  return [...chosen.values()].sort((a,b)=>a.date-b.date).slice(0,8);
}

function renderHighlights(name){
  const now = new Date();
  const hl = pickHighlights();
  HL_KEYS = new Set(hl.map(g=>g.key));
  $('#highlights').innerHTML = hl.length ? hl.map(g=>rowHTML(g,name,now,true)).join('') : `<div class="empty">${L().hlNone}</div>`;
}
function renderExplore(name){
  const now = new Date();
  const box = $('#explore');
  if(activeTypes.size===0){ box.innerHTML = `<div class="empty">${L().exEmpty}</div>`; return; }
  const list = GROUPS.filter(g=>{
    if(HL_KEYS.has(g.key)) return false;
    if(!showPast && g.date < todayMid()) return false;
    return [...g.types].some(t=>activeTypes.has(t));
  });
  box.innerHTML = list.length ? list.map(g=>rowHTML(g,name,now,false)).join('') : `<div class="empty">${L().exNone}</div>`;
}
function renderFilters(){
  const f = $('#filters');
  f.innerHTML = Object.keys(TYPE_EMOJI).map(k=>
    `<div class="chip ${activeTypes.has(k)?'on':''}" data-type="${k}">${TYPE_EMOJI[k]} ${L().types[k]}</div>`).join('');
  f.querySelectorAll('.chip').forEach(c=>{
    c.onclick = ()=>{ const t=c.dataset.type; activeTypes.has(t)?activeTypes.delete(t):activeTypes.add(t); c.classList.toggle('on'); renderExplore($('#name').value.trim()); };
  });
}
function renderStats(dob){
  const now = new Date();
  const ms = now - dob;
  const days = Math.floor(ms/DAY), weeks = Math.floor(days/7), hours = Math.floor(ms/3600000), seconds = Math.floor(ms/1000);
  let months = (now.getFullYear()-dob.getFullYear())*12 + (now.getMonth()-dob.getMonth());
  if(now.getDate() < dob.getDate()) months--;
  let y = now.getFullYear()-dob.getFullYear();
  const md = now.getMonth()-dob.getMonth();
  if(md<0 || (md===0 && now.getDate()<dob.getDate())) y--;
  const toBday = Math.ceil((addYears(dob, y+1)-now)/DAY);
  $('#ageLine').innerHTML = L().ageLine(y, toBday);
  let html = [days,weeks,months,hours].map((v,i)=>
    `<div class="stat"><div class="n">${nf.format(v)}</div><div class="l">${L().statLabels[i]}</div></div>`).join('');
  const mf = muskFact(seconds), U = L().muskUnit;
  let vt;
  if(mf.totalHours < 1)        vt = `~${nf.format(mf.minutes)} ${U.minute}`;
  else if(mf.totalHours < 72)  vt = `~${nf.format(Math.round(mf.totalHours))} ${U.hour}`;
  else                         vt = `~${nf.format(mf.days)} ${U.day} ${nf.format(mf.hours)} ${U.hour}`;
  html += `<div class="stat live" id="secCell" style="grid-column:1 / -1">`
        + `<div class="n">${nf.format(seconds)}</div>`
        + `<div class="l">${L().statLabels[4]}</div>`
        + `<div class="musk">${L().muskLine(vt)}</div></div>`;
  $('#stats').innerHTML = html;
  // sekundy tikajú naživo — to je tá vec „počas tohto dňa“ 🙂
  if(secTimer) clearInterval(secTimer);
  secTimer = setInterval(()=>{
    const c = $('#secCell'); if(c && lastDob) c.querySelector('.n').textContent = nf.format(Math.floor((Date.now()-lastDob)/1000));
  }, 1000);
}

function isBirthdayToday(dob){
  const t = new Date();
  if(dob.getDate()===t.getDate() && dob.getMonth()===t.getMonth()) return true;
  const leap = y=> (y%4===0 && y%100!==0) || y%400===0;
  if(dob.getMonth()===1 && dob.getDate()===29 && !leap(t.getFullYear()) && t.getMonth()===1 && t.getDate()===28) return true;
  return false;
}
function showBirthday(name){
  $('#bdayTitle').innerHTML = L().bdayTitle(name);
  $('#birthday').classList.add('show');
  launchConfetti();
}
function launchConfetti(){
  const cv = $('#confetti'); const ctx = cv.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = ()=>{ cv.width = innerWidth*dpr; cv.height = innerHeight*dpr; };
  size(); window.addEventListener('resize', size);
  cv.style.display = 'block';
  const colors = ['#7c3aed','#ec4899','#f59e0b','#16a34a','#3b82f6','#ef4444'];
  const N = Math.min(180, Math.round(innerWidth/6));
  const parts = Array.from({length:N}, ()=>({ x:Math.random()*cv.width, y:-Math.random()*cv.height*0.4, r:(6+Math.random()*7)*dpr,
    c:colors[(Math.random()*colors.length)|0], vx:(Math.random()-0.5)*2*dpr, vy:(2+Math.random()*4)*dpr, rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.3 }));
  const start = performance.now();
  function frame(now){
    const t = now - start; ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.03*dpr; p.rot+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.globalAlpha=Math.max(0,1-t/6500); ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6); ctx.restore(); });
    if(t<6500) requestAnimationFrame(frame); else { ctx.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; }
  }
  requestAnimationFrame(frame);
}

function shareUrl(){
  const d = $('#dob').value, n = $('#name').value.trim();
  const p = new URLSearchParams(); p.set('d', d); if(n) p.set('n', n); if(lang!=='sk') p.set('lang', lang);
  return location.origin + location.pathname + '?' + p.toString();
}
$('#copyLink').onclick = async ()=>{
  if(!$('#dob').value){ alert(L().aDate); return; }
  const url = shareUrl(), btn = $('#copyLink');
  try{ await navigator.clipboard.writeText(url); }
  catch(e){ prompt(L().aManual, url); return; }
  btn.textContent = L().copied; btn.classList.add('copied');
  setTimeout(()=>{ btn.textContent = L().copyLink; btn.classList.remove('copied'); }, 1800);
};

/* zdieľanie na sociálne siete */
function shareLinks(){
  const url = shareUrl(), text = L().shareText;
  return {
    wa:`https://wa.me/?text=${encodeURIComponent(text+' '+url)}`,
    fb:`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
    x:`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,
    tg:`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`
  };
}
function renderShare(){
  if(!$('#dob').value) return;
  const l = shareLinks();
  document.querySelectorAll('#shareRow a[data-net]').forEach(a=>{ a.href = l[a.dataset.net]; });
}
$('#shareRow').addEventListener('mousedown', renderShare);   // link je vždy aktuálny pred kliknutím
$('#shareNative').onclick = async ()=>{
  if(!$('#dob').value){ alert(L().aDate); return; }
  if(navigator.share){ try{ await navigator.share({title:L().title, text:L().shareText, url:shareUrl()}); }catch(e){} }
};

function icsEscape(s){ return s.replace(/[\\;,]/g,m=>'\\'+m).replace(/\n/g,'\\n'); }
function downloadIcs(){
  const name = $('#name').value.trim();
  const keys = [...document.querySelectorAll('#results input[type=checkbox]:checked')].map(c=>c.dataset.key);
  const groups = [...new Set(keys)].map(k=>GROUPS.find(g=>g.key===k)).filter(Boolean);
  if(!groups.length){ alert(L().aCheck); return; }
  const stamp = new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  let X = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Milniky//SK//','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  groups.forEach(g=>{
    X.push('BEGIN:VEVENT','UID:milnik-'+g.key+'@local','DTSTAMP:'+stamp,
      'DTSTART;VALUE=DATE:'+g.key,'DTEND;VALUE=DATE:'+ymd(addDays(g.date,1)),
      'SUMMARY:'+icsEscape((g.super?'⭐ ':'')+groupTitle(g,name)),
      'DESCRIPTION:'+icsEscape(L().icsDesc(fmtShort.format(g.date))),
      'TRANSP:TRANSPARENT','BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY','DESCRIPTION:Milestone tomorrow!','END:VALARM','END:VEVENT');
  });
  X.push('END:VCALENDAR');
  const blob = new Blob([X.join('\r\n')],{type:'text/calendar'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=(name?name.replace(/\s+/g,'_')+'_':'')+'milniky.ics';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

/* poďakovanie — Pay by Square QR (univerzálny) + Revolut tlačidlo */
function revolutUrl(amt){ return `https://revolut.me/${REVOLUT}/eur${amt}`; }
function qrImg(data, size){ return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&margin=0&ecc=M&data=${encodeURIComponent(data)}`; }

let _bysquare = null;
async function bysquareEncode(amount){
  if(!_bysquare) _bysquare = await import('https://cdn.jsdelivr.net/npm/bysquare@2.10.0/+esm');
  return _bysquare.encode({
    payments: [{
      type: 1,                       // PaymentOrder
      amount: Number(amount),
      currencyCode: 'EUR',
      paymentNote: 'Podpora autora / Support the author',
      bankAccounts: [{ iban: PAY.iban, bic: PAY.bic }],
      beneficiary: { name: PAY.name }
    }]
  });
}

async function renderThanks(){
  const t = L();
  const haveBank = !!(PAY && PAY.iban);
  $('#thanksBox').innerHTML = `<div class="tiers">${
    t.tiers.map((tier,i)=>{
      const qr = haveBank ? `<img class="qr" id="qr${i}" alt="Pay by Square QR">` : `<div class="qrph">${t.qrWait}</div>`;
      const link = REVOLUT ? `<a class="pay" href="${revolutUrl(tier.amt)}" target="_blank" rel="noopener">${t.payBtn} €${tier.amt}</a>` : '';
      return `<div class="tier"><div class="e">${tier.e}</div><div class="l">${tier.l}</div>${qr}${link}</div>`;
    }).join('')
  }</div><p class="hint" style="margin-top:12px">${t.thanksNote}</p>`;

  if(haveBank){
    for(let i=0;i<t.tiers.length;i++){
      const img = document.getElementById('qr'+i);
      if(!img) continue;
      try{
        const data = await bysquareEncode(t.tiers[i].amt);
        img.src = qrImg(data, 150);
      }catch(e){
        img.outerHTML = `<div class="qrph">${t.qrWait}</div>`;
      }
    }
  }
}

/* statické texty podľa jazyka */
function applyStaticTexts(){
  const t = L();
  document.documentElement.lang = t.htmlLang;
  $('#hTitle').textContent = t.title;
  $('#hSub').textContent = t.sub;
  $('#lblDob').textContent = t.dob;
  $('#lblName').textContent = t.name;
  $('#name').placeholder = t.namePh;
  $('#go').textContent = t.go;
  $('#copyLink').textContent = t.copyLink;
  $('#copyHint').textContent = t.copyHint;
  $('#shareLabel').textContent = t.shareLabel;
  $('#shareNative').textContent = t.shareNative;
  $('#hlTitle').textContent = t.hlTitle;
  $('#hlSub').textContent = t.hlSub;
  $('#dlText').textContent = t.download;
  $('#importBtn').textContent = t.importBtn;
  $('#importHelp').innerHTML = t.importHelp;
  $('#exTitle').textContent = t.exTitle;
  $('#exSub').textContent = t.exSub;
  $('#togglePast').textContent = showPast ? t.hidePast : t.showPast;
  $('#footer').textContent = t.footer;
  $('#bdaySub').textContent = t.bdaySub;
  $('#thanksTitle').textContent = t.thanksTitle;
  $('#thanksIntro').textContent = t.thanksIntro;
  $('#thanksBtn').textContent = ($('#thanksBox').style.display==='block') ? t.thanksBtnHide : t.thanksBtnShow;
  if($('#thanksBox').style.display==='block') renderThanks();
}
function setLang(l){
  lang = (l==='en') ? 'en' : 'sk';
  setFormatters();
  try{ localStorage.setItem('milniky_lang', lang); }catch(e){}
  document.querySelectorAll('.langSwitch button').forEach(b=>b.classList.toggle('on', b.dataset.lang===lang));
  applyStaticTexts();
  if($('#results').style.display==='block' && lastDob){
    const name = $('#name').value.trim();
    renderStats(lastDob); renderHighlights(name); renderFilters(); renderExplore(name); renderShare();
    if($('#birthday').classList.contains('show')) $('#bdayTitle').innerHTML = L().bdayTitle(name);
  }
}
document.querySelectorAll('.langSwitch button').forEach(b=> b.onclick = ()=> setLang(b.dataset.lang));

function runCalc(){
  const v = $('#dob').value;
  if(!v){ alert(L().aDob); return; }
  const dob = new Date(v+'T00:00:00');
  if(isNaN(dob) || dob > new Date()){ alert(L().aInvalid); return; }
  lastDob = dob;
  GROUPS = groupAll(build(dob));
  activeTypes = new Set();
  showPast = false;
  $('#togglePast').textContent = L().showPast;
  const name = $('#name').value.trim();
  renderStats(dob); renderHighlights(name); renderFilters(); renderExplore(name); renderShare();
  $('#results').style.display = 'block';
  $('#birthday').classList.remove('show');
  if(isBirthdayToday(dob)) showBirthday(name);
  $('#results').scrollIntoView({behavior:'smooth'});
}
$('#go').onclick = runCalc;
$('#togglePast').onclick = ()=>{ showPast=!showPast; $('#togglePast').textContent = showPast?L().hidePast:L().showPast; renderExplore($('#name').value.trim()); };
$('#downloadIcs').onclick = downloadIcs;
$('#importBtn').onclick = ()=>{ const h=$('#importHelp'); h.style.display = h.style.display==='none' ? 'block':'none'; };
$('#thanksBtn').onclick = ()=>{
  const b=$('#thanksBox'); const open = b.style.display!=='block';
  b.style.display = open ? 'block':'none';
  $('#thanksBtn').textContent = open ? L().thanksBtnHide : L().thanksBtnShow;
  if(open) renderThanks();
};
['dob','name'].forEach(id=>$('#'+id).addEventListener('keydown',e=>{ if(e.key==='Enter') runCalc(); }));

(function init(){
  if(navigator.share) $('#shareNative').style.display = 'inline-block';
  const p = new URLSearchParams(location.search);
  let initial = p.get('lang');
  if(!initial){ try{ initial = localStorage.getItem('milniky_lang'); }catch(e){} }
  if(!initial){ initial = (navigator.language||'').toLowerCase().startsWith('en') ? 'en' : 'sk'; }
  setLang(initial);
  $('#visits').src = `https://api.visitorbadge.io/api/visitors?path=${encodeURIComponent('superstranky.github.io/milniky')}&label=${encodeURIComponent(L().visitsLabel)}&labelColor=%23312e81&countColor=%237c3aed&style=flat`;
  const d = p.get('d'), n = p.get('n');
  if(d && /^\d{4}-\d{2}-\d{2}$/.test(d)){ $('#dob').value = d; if(n) $('#name').value = n; runCalc(); }
})();
